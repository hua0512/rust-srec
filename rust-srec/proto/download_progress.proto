syntax = "proto3";

package download_progress;

// Event types for WebSocket messages
enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_SNAPSHOT = 1;
  EVENT_TYPE_DOWNLOAD_META = 2;
  EVENT_TYPE_DOWNLOAD_METRICS = 3;
  EVENT_TYPE_SEGMENT_COMPLETED = 4;
  EVENT_TYPE_DOWNLOAD_COMPLETED = 5;
  EVENT_TYPE_DOWNLOAD_FAILED = 6;
  EVENT_TYPE_DOWNLOAD_CANCELLED = 7;
  EVENT_TYPE_ERROR = 8;
  EVENT_TYPE_DOWNLOAD_REJECTED = 9;
  // Emitted once per monitor poll, after the check-history writer task has
  // committed the row to SQLite. Powers the streamer details page's
  // check-history strip without polling — same per-streamer subscription
  // model as the download events above.
  EVENT_TYPE_STREAMER_CHECK_RECORDED = 10;
  // A streamer is live and a download has been requested but is
  // parked waiting for a concurrency slot to free up. Cleared by a
  // subsequent EVENT_TYPE_DOWNLOAD_META + Started for the same
  // session, or by EVENT_TYPE_DOWNLOAD_DEQUEUED if the pipeline aborts
  // before the download starts. Fast-path acquires (slot immediately available)
  // do NOT emit this — there's no wait worth showing.
  EVENT_TYPE_DOWNLOAD_QUEUED = 12;
  // Cleanup signal for a previously-queued pipeline that aborted
  // before the download starts (cancellation, shutdown, schedule close,
  // freshness/state re-check).
  // Frontend clears the streamer's queued badge on receipt.
  // Fast-path acquires never emit this — they didn't emit
  // DownloadQueued either.
  EVENT_TYPE_DOWNLOAD_DEQUEUED = 13;
}

// Server-to-client message envelope
message WsMessage {
  EventType event_type = 1;
  oneof payload {
    DownloadSnapshot snapshot = 2;
    DownloadMeta download_meta = 3;
    DownloadMetrics download_metrics = 4;
    SegmentCompleted segment_completed = 5;
    DownloadCompleted download_completed = 6;
    DownloadFailed download_failed = 7;
    DownloadCancelled download_cancelled = 8;
    ErrorPayload error = 9;
    DownloadRejected download_rejected = 10;
    StreamerCheckRecorded streamer_check_recorded = 11;
    DownloadQueued download_queued = 12;
    DownloadDequeued download_dequeued = 13;
  }
}

// Client-to-server message for filtering
message ClientMessage {
  oneof action {
    SubscribeRequest subscribe = 1;
    UnsubscribeRequest unsubscribe = 2;
  }
}

message SubscribeRequest {
  string streamer_id = 1;
}

message UnsubscribeRequest {}

// Initial snapshot of all active downloads
message DownloadSnapshot {
  repeated DownloadState downloads = 1;
  // Streamers that are live and have a download request parked on
  // the concurrency queue. Lets a freshly-connecting WS client
  // restore the "queued" badge without waiting for the next event.
  repeated DownloadQueued queued = 2;
}

// A complete download state, split into metadata and metrics.
message DownloadState {
  DownloadMeta meta = 1;
  DownloadMetrics metrics = 2;
}

// Download metadata (low frequency).
message DownloadMeta {
  string download_id = 1;
  string streamer_id = 2;
  string session_id = 3;
  string engine_type = 4;
  int64 started_at_ms = 5;
  // Monotonic (best-effort) update timestamp to help clients coalesce meta updates.
  // Clients should ignore meta updates older than what they've already applied.
  int64 updated_at_ms = 8;
  // CDN host for this download (host[:port]).
  string cdn_host = 6;
  // The actual stream URL being downloaded (may contain signed query params).
  string download_url = 7;
}

// Download metrics (high frequency).
message DownloadMetrics {
  string download_id = 1;
  string status = 2;
  uint64 bytes_downloaded = 3;
  double duration_secs = 4;
  uint64 speed_bytes_per_sec = 5;
  uint32 segments_completed = 6;
  double media_duration_secs = 7;
  double playback_ratio = 8;
}

// Segment completed event
message SegmentCompleted {
  string download_id = 1;
  string streamer_id = 2;
  string segment_path = 3;
  uint32 segment_index = 4;
  double duration_secs = 5;
  uint64 size_bytes = 6;
  string session_id = 7;
  // Human-readable split reason, empty if none.
  string split_reason = 8;
  int64 started_at_ms = 9;
  int64 completed_at_ms = 10;
}

// Download completed event
message DownloadCompleted {
  string download_id = 1;
  string streamer_id = 2;
  string session_id = 3;
  uint64 total_bytes = 4;
  double total_duration_secs = 5;
  uint32 total_segments = 6;
}

// Download failed event
message DownloadFailed {
  string download_id = 1;
  string streamer_id = 2;
  string session_id = 3;
  string error = 4;
  bool recoverable = 5;
}

// Download cancelled event
message DownloadCancelled {
  string download_id = 1;
  string streamer_id = 2;
  string session_id = 3;
  // Download stop cause (best-effort).
  // Values are produced by server-side `DownloadStopCause::as_str()`.
  string cause = 4;
}

// Download rejected event (rejected before starting).
message DownloadRejected {
  string streamer_id = 1;
  string session_id = 2;
  string reason = 3;
  uint64 retry_after_secs = 4;
  bool recoverable = 5;
}

// Error payload for service errors
message ErrorPayload {
  string code = 1;
  string message = 2;
}

// One row of streamer check-history, broadcast immediately after the writer
// task commits it to SQLite. Mirrors the wire shape of the
// `StreamerCheckHistoryEntry` REST response — clients use this for live
// updates and fall back to GET /api/streamers/:id/check-history for the
// initial backlog.
//
// `outcome` is the discriminator (`live`|`offline`|`filtered`|`transient_error`
// |`fatal_error`). `fatal_kind`, `filter_reason`, and `error_message` are
// outcome-specific detail; client code should treat empty strings the same as
// missing (proto3 has no scalar nullability).
message StreamerCheckRecorded {
  string streamer_id = 1;
  // Unix epoch milliseconds (UTC). Matches `live_sessions.start_time` units.
  int64 checked_at_ms = 2;
  int32 duration_ms = 3;
  string outcome = 4;
  string fatal_kind = 5;
  string filter_reason = 6;
  // Truncated transient-error message (≤ 512 chars at write time).
  string error_message = 7;
  uint32 streams_extracted = 8;
  // JSON-encoded selected-stream descriptor:
  //   { quality, stream_format, media_format, bitrate, codec, fps }
  // Empty string when `outcome != 'live'`. URL is intentionally omitted.
  string stream_selected_json = 9;
  string title = 10;
  string category = 11;
  // 0 when the platform doesn't report viewer count (proto3 scalar default).
  uint64 viewer_count = 12;
  // JSON-encoded array of every candidate the platform extractor returned
  // (same per-element shape as `stream_selected_json`). Empty string when
  // `outcome != 'live'` or when no candidates were captured. The selected
  // candidate is also referenced by `stream_selected_json`; clients render
  // the array with the matching candidate marked.
  string streams_extracted_json = 13;
}

// A streamer's download is parked on the concurrency queue.
//
// Emitted by the download manager when an `acquire_slot` call has to
// wait for a slot to free up. Cleared by a subsequent
// `DownloadStarted` for the same `session_id` (engine running) or by
// `DownloadDequeued` if the pipeline aborts before starting.
message DownloadQueued {
  string streamer_id = 1;
  string session_id = 2;
  string streamer_name = 3;
  // Engine type as a stable lowercase string (`ffmpeg`, `streamlink`,
  // `mesio`). Matches `DownloadMeta.engine_type`.
  string engine_type = 4;
  // Wall-clock millis since the unix epoch when the request entered
  // the queue. Frontend uses this for "waiting since X" display.
  int64 queued_at_ms = 5;
  // High-priority requests are surfaced with a different badge tone
  // and may take precedence on slot turnover.
  bool is_high_priority = 6;
}

// Cleanup signal for a queued pipeline that aborted before starting a
// download. Carries no payload beyond identification — the frontend just
// removes the streamer's queued badge entry. No retry semantics.
message DownloadDequeued {
  string streamer_id = 1;
  string session_id = 2;
  string streamer_name = 3;
}
